<!DOCTYPE html>
<html>
<head>
    <title>VPN Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background-color: #121212;
            color: white;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            width: 500px;
            margin: auto;
        }

        input {
            padding: 10px;
            width: 70%;
            margin-right: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        pre {
            background: black;
            padding: 15px;
            border-radius: 5px;
            text-align: left;
            overflow-x: auto;
        }

        h2 {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">

<h2>WireGuard VPN Dashboard</h2>

<form method="post">
    <input type="text" name="client" placeholder="Enter client name" required>
    <button type="submit">Create</button>
</form>

{% if config %}
    <h3>Client Config</h3>
    <pre>{{ config }}</pre>
{% endif %}

{% if public_key %}
    <h3>Client Public Key</h3>
    <pre>{{ public_key }}</pre>
{% endif %}

{% if client %}
    <br>
    <a href="/download/{{ client }}">
        <button type="button">Download Config</button>
    </a>
{% endif %}

</div>

</body>
</html>
